# NoLifeChatter configuration.
#
# Copy this file to "config.toml" and fill in your own values.
# config.toml is git-ignored, so your channel names stay out of version control.
# Secrets (API keys, client secret) do NOT go here — they live in .env.

[bot]
# Command prefix users type before a command (e.g. "~help").
prefix = "~"

# Twitch channels the bot should join on startup (lowercase, no "#").
# Add your own channel here.
channels = ["your_channel"]

# Optional message the bot posts when it connects.
# Leave it as an empty string to stay silent on connect.
ready_message = ""
# If set, only post the ready message to this one channel (leave "" for all).
ready_channel = ""

[auth]
# Twitch usernames allowed to change their own translation settings
# (toggle auto-translate, set language, set output mode).
admins = ["your_channel"]

# Subset of users also allowed to flip the global / per-channel translation
# switches. Keep this small.
super_admins = ["your_channel"]

[paths]
# Where the SQLite settings database lives (created by scripts/init_db.py).
database = "data/synced/bot_settings.db"

# Where the refreshing OAuth tokens are stored
# (created by scripts/get_initial_token.py).
token_file = "data/unsynced/token_data.json"

# Path to your Google Cloud service-account JSON key used for translation.
# The GOOGLE_APPLICATION_CREDENTIALS environment variable overrides this.
google_credentials = "data/unsynced/google-service-account.json"

[translation]
# Default language to translate into when a user enables auto-translate.
default_target = "EN"

# Minimum language-detection confidence (0–1). Detection is local (lingua).
# This is used by *practice mode*'s single-guess gate. Channel-wide
# auto-translate uses the share-based gate below instead (lingua's absolute
# scores are miscalibrated across languages, so an absolute floor under-fires
# for languages like Spanish that simply never score as high as, say, German).
min_confidence = 0.4

# Minimum word count before channel-wide auto-translate considers a message
# (short messages misdetect). Messages in non-Latin scripts, and known speakers
# of a language, bypass this.
min_words = 4

# Channel auto-translate gate (the main dial). A message counts as "confidently
# not the target language" when the best foreign guess wins the head-to-head
# *share* against the target by at least this much:
#
#     best_foreign / (best_foreign + target)  >=  min_foreign_share
#
# This asks "of the English-vs-foreign contest, how decisively does foreign
# win?" — which is reliable — instead of "did foreign clear some absolute score"
# — which isn't, because Spanish/Italian/etc. rarely score as high as German.
# 0.63 cleanly separates real foreign text from English/junk on a labelled test
# set. Raise = stricter (skip more), lower = catch more.
min_foreign_share = 0.63

# Tiny absolute floor so near-uniform noise — where every language sits around
# 0.05 and the share figure is meaningless — is still skipped.
min_foreign_signal = 0.10

# Short messages (fewer than min_words words) are unreliable to detect AND to
# translate: lingua and the translator both invent a "translation" for 1–2 word
# fragments and for emote names that slip past cleaning. So a short message is
# only translated when a SINGLE language is detected with at least this absolute
# confidence. Real short foreign ("danke schön" ≈ 0.68, "buongiorno" ≈ 0.95)
# clears it; fragments and emote junk (≈ 0.25) don't. Raise = skip more short
# messages; lower = translate more of them (and risk more nonsense).
min_short_confidence = 0.55

[archive]
# Searchable chat archive (see docs/CHAT_ARCHIVE.md): historical Chatterino
# logs ingested by scripts/ingest_chatterino.py plus live capture of every
# message the bot sees. Powers ~said / ~quote / ~firstseen / ~chatstats.
# The DB lives in a gitignored directory — chat content never reaches git.
database = "data/unsynced/chat_archive.db"
live_capture = true
# Optional: your Chatterino logs root, so the ingest script needs no argument.
# e.g. 'C:\Users\you\AppData\Roaming\Chatterino2\Logs\Twitch\Channels'
chatterino_logs = ""
# Optional: spelling variants that should count as the same channel/user
# (typo'd channel dirs, renamed accounts).
[archive.aliases]
# old_name = "real_name"
# Optional: more precise aliases. Use user_aliases for alt accounts so a user
# merge does not rename a channel with the same spelling. Existing archive rows
# under either name are included at query time.
[archive.user_aliases]
# alt_account = "main_account"
[archive.channel_aliases]
# old_channel = "current_channel"

[persona]
# Persona features (see docs/PERSONA_BOT_ROADMAP.md). ~markov/~mimic post a
# Markov-generated line in a chatter's style, built from their archived chat.
mimic_enabled = true
# Random reactions: chance per message the bot spontaneously posts a persona
# line of a random recent chatter (0 = off; 0.002 is about 1 in 500). A
# cooldown (seconds) keeps it from bunching up during a busy stretch.
reaction_chance = 0.0
# Higher chance when a message appears directed at a recent chatter persona
# (@name or bare name like "gero"). Still subject to reaction_cooldown.
reaction_directed_chance = 0.0
reaction_cooldown = 90
# Chance that an autonomous reaction sends one extra short follow-up line,
# like a real chatter double-texting. Keep max low to avoid spam.
reaction_continue_chance = 0.0
reaction_max_continuations = 1
reaction_continue_delay = 1.5
# Same idea, but for explicit ~persona/~hyper commands. Commands always try to
# answer once; this only controls occasional extra follow-up messages.
command_continue_chance = 0.0
command_max_continuations = 1
command_continue_delay = 1.5
# Random reactions use the LLM persona engine. Markov stays explicit-command
# only via ~mimic/~markov.
reaction_use_llm = true
# Anything the bot is about to post is checked against this denylist first, so
# recombined real chat can't get the bot banned for posting slurs/hate terms.
# Keep the actual list in a gitignored file (one term per line, '#' comments);
# if the file is missing, nothing is filtered.
blocklist_file = "data/unsynced/blocklist.txt"

[llm]
# Persona engine backend — any OpenAI-compatible chat endpoint. LM Studio's
# local server by default (free, local, private). Load a model + start the
# server, or point this at llama.cpp / Ollama / a hosted API.
endpoint = "http://127.0.0.1:1234/v1/chat/completions"
model = "local"
timeout = 90
exemplars = 150
# Of those exemplars, try to fill this many with author-only messages retrieved
# for the current chat topic. 0 restores the old random-only prompt.
relevant_exemplars = 90
context_messages = 25
# If the full prompt times out/fails, retry once with this smaller prompt.
retry_exemplars = 60
retry_context_messages = 12
# Top retrieval hits expanded into small "chat moment" snippets (the line plus
# 2 messages before/after) so the model sees how the author responds, not just
# their vocabulary. Each snippet costs ~5 lines of the relevant budget.
snippet_hits = 8
# How many samples to draw per reply; the best valid candidate is posted
# (copies, URLs, and echoes of other chatters' lines are rejected). The big
# prompt is processed once and cached, so 2 is cheap. 1 = single draw.
candidates = 2
[speaker]
# Write a language this many times (confidently) and the bot treats you as a
# speaker of it — translating even your short messages. A simple count
# threshold that flips the language on; no percentages/ratios.
min_count = 3

# Languages the passive (channel-wide) auto-translate will react to.
supported = [
    "EL", "ZH-CN", "ES", "FR", "AR", "RU", "HU", "TR", "KO", "JA",
    "VI", "DE", "IT", "PT", "PL", "CS", "SK", "UK", "LA", "EN",
]
